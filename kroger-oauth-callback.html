<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kroger sign-in — Grocery Goblin</title>
  <meta name="theme-color" content="#131b38">
  <link rel="icon" href="/icon.png" type="image/png" sizes="any">
  <link rel="apple-touch-icon" href="/icon.png">
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 480px; }
    .msg { margin: 1rem 0; padding: 0.75rem; border-radius: 8px; }
    .error { background: #fee; color: #c00; }
    .success { background: #efe; color: #060; }
    a { color: #0d9488; }
  </style>
</head>
<body>
  <h2>Sign-in</h2>
  <p id="status">Completing sign-in…</p>
  <p id="detail"></p>
  <a id="back" href="/index.html" style="display:none;">← Back</a>

  <script src="api-host-bootstrap.js"></script>
  <script>
    (async function () {
      const base = await window.krogerCartApiBase();
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const errorParam = params.get("error");

      if (errorParam) {
        document.getElementById("status").textContent = "Sign-in was cancelled or failed.";
        document.getElementById("detail").textContent = "Error: " + (params.get("error_description") || errorParam);
        document.getElementById("back").style.display = "inline";
        return;
      }

      if (!code) {
        document.getElementById("status").textContent = "No authorization code received.";
        document.getElementById("detail").innerHTML = "Make sure you started sign-in from the app and that the redirect URI in Kroger Developer Portal matches exactly (including http vs https, port, path).";
        document.getElementById("back").style.display = "inline";
        return;
      }

      const storedState = sessionStorage.getItem("krogerOAuthState");
      if (!storedState) {
        document.getElementById("status").textContent = "Session expired.";
        document.getElementById("detail").textContent = "Please go back and click sign-in again.";
        document.getElementById("back").style.display = "inline";
        return;
      }

      if (params.get("state") !== storedState) {
        document.getElementById("status").textContent = "Sign-in state mismatch.";
        document.getElementById("detail").textContent = "Please try signing in again.";
        document.getElementById("back").style.display = "inline";
        return;
      }

      const redirectUri = sessionStorage.getItem("krogerOAuthRedirectUri") || (window.location.origin + "/kroger-oauth-callback.html");

      try {
        var pub = await fetch(base + "/api/public-config").then(function (r) { return r.json(); });
        var xh = { "Content-Type": "application/json" };
        if (!pub.cookieSessionAuth) {
          var acc = localStorage.getItem("appCognitoAccessToken");
          if (acc) xh["Authorization"] = "Bearer " + String(acc).replace(/\s+/g, "").trim();
          var idt = localStorage.getItem("appCognitoIdToken");
          if (idt) xh["X-Cognito-Id-Token"] = String(idt).replace(/\s+/g, "").trim();
        }
        const res = await fetch(base + "/kroger-api/oauth-exchange", {
          method: "POST",
          headers: xh,
          credentials: pub.cookieSessionAuth ? "include" : "same-origin",
          body: JSON.stringify({
            code: code,
            redirectUri: redirectUri,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("status").textContent = "Token exchange failed.";
          document.getElementById("detail").textContent = data.error_description || data.error || res.status;
          document.getElementById("back").style.display = "inline";
          return;
        }

        if (pub.cookieSessionAuth && data.ok) {
          sessionStorage.removeItem("krogerOAuthState");
          sessionStorage.removeItem("krogerOAuthRedirectUri");
          try {
            localStorage.removeItem("krogerUserToken");
            localStorage.removeItem("krogerUserTokenExpiry");
            localStorage.removeItem("krogerUserRefreshToken");
          } catch (e) { /* ignore */ }
          document.getElementById("status").className = "msg success";
          document.getElementById("status").textContent = "Signed in successfully. Redirecting…";
          window.location.href = "/index.html";
          return;
        }

        if (!data.access_token) {
          document.getElementById("status").textContent = "No access token in response.";
          document.getElementById("detail").textContent = JSON.stringify(data);
          document.getElementById("back").style.display = "inline";
          return;
        }

        sessionStorage.removeItem("krogerOAuthState");
        sessionStorage.removeItem("krogerOAuthRedirectUri");

        const token = String(data.access_token).replace(/\s+/g, "").trim();
        const expiresInSec = (data.expires_in != null && data.expires_in > 0) ? data.expires_in : 3600;
        const expiresIn = Math.max(expiresInSec, 300) * 1000;
        localStorage.setItem("krogerUserToken", token);
        localStorage.setItem("krogerUserTokenExpiry", String(Date.now() + expiresIn));
        if (data.refresh_token) {
          localStorage.setItem("krogerUserRefreshToken", String(data.refresh_token));
        }

        document.getElementById("status").className = "msg success";
        document.getElementById("status").textContent = "Signed in successfully. Redirecting…";
        window.location.href = "/index.html";
      } catch (e) {
        document.getElementById("status").textContent = "Request failed.";
        document.getElementById("detail").className = "msg error";
        document.getElementById("detail").textContent = e.message || String(e);
        document.getElementById("back").style.display = "inline";
      }
    })();
  </script>
</body>
</html>
