<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Grocery Goblin</title>
  <meta name="description" content="Sign in or create a Grocery Goblin account for meal plans and Kroger cart sync.">
  <meta name="theme-color" content="#131b38">
  <meta name="google-site-verification" content="19GEFOQ0hKrVJkwFO7iCaowzrtfCKh8VgXVtoBy7xbA" />
  <link rel="icon" href="/icon.png" type="image/png" sizes="any">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="stylesheet" href="kroger-cart.css">
</head>
<body class="auth-page">
  <main class="auth-page__shell" role="main">
    <div class="auth-page__card">
      <div class="auth-page__brand">
        <img
          class="auth-page__logo"
          src="/logo.png"
          alt="Grocery Goblin"
          width="104"
          height="104"
          decoding="async"
          onerror="this.onerror=null;this.src='/icon.png'"
        />
        <h1 class="auth-page__title">Grocery Goblin</h1>
        <p class="auth-page__tagline">Meal plans &amp; Kroger cart, together.</p>
      </div>
      <p class="auth-page__status" id="msg" role="status" aria-live="polite">Checking session…</p>
      <nav class="auth-page__nav" aria-label="Site links">
        <a href="/">← Home</a>
        <span class="auth-page__nav-sep" aria-hidden="true">·</span>
        <a href="/index.html">App</a>
        <span class="auth-page__nav-sep" aria-hidden="true">·</span>
        <a href="/feedback.html">Feedback</a>
      </nav>
    </div>
  </main>
  <script src="api-host-bootstrap.js"></script>
  <script>
    (async function () {
      var qs = new URLSearchParams(window.location.search);
      var signupFlow = qs.get("signup") === "1" || qs.get("intent") === "signup";
      var base = await window.krogerCartApiBase();
      var pub;
      try {
        var pr = await fetch(window.location.origin + "/deploy-config.json", { cache: "no-store" });
        if (!pr.ok) throw new Error("HTTP " + pr.status);
        pub = await pr.json();
      } catch (e) {
        document.getElementById("msg").textContent =
          "Failed to load config: " + (e && e.message ? e.message : e);
        return;
      }
      if (pub.cookieSessionAuth) {
        var mr = await fetch(base + "/api/me", { method: "GET", credentials: "include" });
        if (mr.ok) {
          window.location.replace("/index.html");
          return;
        }
      } else if (localStorage.getItem("appCognitoAccessToken")) {
        window.location.replace("/index.html");
        return;
      }
      var c = pub;
      if (!c.authRequired) {
        document.getElementById("msg").textContent = "App sign-in is disabled. Redirecting…";
        window.location.replace("/index.html");
        return;
      }
      if (!c.cognitoDomain || !c.cognitoClientId) {
        document.getElementById("msg").textContent =
          "Cognito is not configured (COGNITO_DOMAIN / COGNITO_CLIENT_ID on the server).";
        return;
      }
      var scope = encodeURIComponent("openid email phone");
      var redirect = encodeURIComponent(c.cognitoRedirectUri);
      var clientId = encodeURIComponent(c.cognitoClientId);
      var state = Math.random().toString(36).slice(2) + Date.now().toString(36);
      sessionStorage.setItem("cognitoOAuthState", state);
      var oauthPath = signupFlow ? "/signup" : "/oauth2/authorize";
      var url =
        "https://" + c.cognitoDomain + oauthPath +
        "?client_id=" + clientId +
        "&response_type=code" +
        "&scope=" + scope +
        "&redirect_uri=" + redirect +
        "&state=" + encodeURIComponent(state);
      document.getElementById("msg").textContent = signupFlow
        ? "Redirecting to create your account…"
        : "Redirecting to sign-in…";
      window.location.href = url;
    })();
  </script>
</body>
</html>
