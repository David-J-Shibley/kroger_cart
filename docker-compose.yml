# Kroger Cart API (Express). Meal plans use Featherless.ai — set FEATHERLESS_API_KEY (e.g. in .env).
#   docker compose up -d --build
#   open http://localhost:8000/index.html

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
